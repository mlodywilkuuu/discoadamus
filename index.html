<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discoadamus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: #f8f9fa;
            border-bottom: 1px solid #eaeaea;
        }

        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            margin: 0;
            color: #1a1a2e;
        }

        .switcher {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 30px;
            border: 2px solid #4cc9f0;
            border-radius: 50px;
            cursor: pointer;
            background: transparent;
            color: #4cc9f0;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover, .btn.active {
            background: #4cc9f0;
            color: white;
        }

        #stats-display {
            font-size: 1.5rem;
            font-weight: 500;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>Discoadamus</strong></div>
    </nav>

    <main class="hero">
        <h1>DISCO ADAMUS</h1>
        
        <div class="switcher">
            <button class="btn active" onclick="showStats('youtube')">YouTube</button>
            <button class="btn" onclick="showStats('tiktok')">TikTok</button>
        </div>

        <div id="stats-display">Wybierz platformę, aby zobaczyć statystyki.</div>
    </main>

    <script>
        // TUTAJ EDYTUJ SWOJE STATYSTYKI
        const stats = {
            youtube: "YouTube: <strong>12.5K Subskrypcji</strong>",
            tiktok: "TikTok: <strong>45.2K Obserwujących</strong>"
        };

        function showStats(platform) {
            const display = document.getElementById('stats-display');
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Wyświetla statystyki zdefiniowane wyżej
            display.innerHTML = stats[platform];
        }
    </script>

</body>
</html>
