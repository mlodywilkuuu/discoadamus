<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discoadamus</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        
        .navbar { width: 100%; display: flex; align-items: center; padding: 20px 40px; box-sizing: border-box; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); justify-content: flex-start; }
        
        .animated-text { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; background: linear-gradient(90deg, #f72585, #4cc9f0, #f72585); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }

        .hero { display: flex; flex-direction: column; align-items: center; gap: 30px; margin-top: 50px; width: 100%; }
        
        h1 { font-size: 4rem; text-transform: uppercase; margin: 0; background: linear-gradient(90deg, #f72585, #4cc9f0, #f72585); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 3s linear infinite; }
        @keyframes shine { to { background-position: 200% center; } }
        
        .glass-box { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); padding: 30px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .glass-stats { display: flex; gap: 40px; justify-content: center; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 1.8rem; font-weight: bold; color: #1a1a2e; }
        
        .btn { padding: 10px 25px; border: none; border-radius: 50px; cursor: pointer; background: rgba(255, 255, 255, 0.5); font-weight: bold; transition: 0.3s; margin: 0 5px; }
        .btn.active { background: #4cc9f0; color: white; }

        /* Nowoczesny kalendarz */
        .calendar-box { margin-top: 30px; width: 450px; }
        .event-grid { display: flex; flex-direction: column; gap: 15px; }
        .event-card { display: flex; align-items: center; background: rgba(255, 255, 255, 0.5); padding: 15px; border-radius: 15px; border-left: 5px solid #f72585; }
        .date-box { font-weight: bold; color: #f72585; margin-right: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="animated-text">Discoadamus</div>
    </nav>

    <main class="hero">
        <h1>DISCO ADAMUS</h1>
        <div class="switcher">
            <button class="btn active" onclick="updateStats('youtube', event)">YouTube</button>
            <button class="btn" onclick="updateStats('tiktok', event)">TikTok</button>
        </div>

        <div class="glass-box">
            <div id="stats-display" class="glass-stats"></div>
        </div>

        <div class="glass-box calendar-box">
            <h3 style="margin-top:0; color:#1a1a2e;">🗓️ Harmonogram</h3>
            <div class="event-grid">
                <div class="event-card">
                    <div class="date-box">25.06</div>
                    <div><strong>Live Q&A</strong><br><small>Spotkanie z widzami na żywo</small></div>
                </div>
                <div class="event-card">
                    <div class="date-box">30.06</div>
                    <div><strong>Premiera Projektu</strong><br><small>Nowy materiał na kanale</small></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const data = {
            youtube: [
                { label: "Subskrypcje", value: 12200, suffix: "K" },
                { label: "Wyświetleń", value: 4572634, suffix: "M" },
                { label: "Filmów", value: 392, suffix: "" }
            ],
            tiktok: [
                { label: "Obserwujący", value: 73040, suffix: "K" },
                { label: "Polubień", value: 3600000, suffix: "M" },
                { label: "Filmów", value: 887, suffix: "" }
            ]
        };

        function updateStats(platform, event) {
            if (event) {
                document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }
            const display = document.getElementById('stats-display');
            display.innerHTML = ""; 
            data[platform].forEach(item => {
                display.innerHTML += `<div class="stat-item"><span class="stat-value">${item.value.toLocaleString()}${item.suffix}</span>${item.label}</div>`;
            });
        }
        updateStats('youtube');
    </script>
</body>
</html>
