<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Discoadamus - Live Stats</title>
    <!-- ... style pozostają bez zmian ... -->
</head>
<body>
    <!-- ... reszta HTML pozostaje bez zmian ... -->

    <script>
        const CONFIG = {
            clientId: 'cli_3d63186a1974931eeba2421c',
            token: '821abd57f5a749470771a3ced676334229e48bd44df1518a45e711897c89fd55'
        };

        async function fetchData(platform) {
            const url = `https://matrix.sbapis.com/b/${platform}/statistics?query=discoadamus&history=default&allow-stale=false`;
            
            try {
                const response = await fetch(url, {
                    headers: {
                        'clientid': CONFIG.clientId,
                        'token': CONFIG.token
                    }
                });
                const json = await response.json();
                
                if (platform === 'youtube') {
                    return [
                        { label: "Subskrypcje", value: json.data.statistics.total.subscribers, suffix: "" },
                        { label: "Wyświetleń", value: json.data.statistics.total.views, suffix: "" },
                        { label: "Filmów", value: json.data.statistics.total.uploads, suffix: "" }
                    ];
                } else {
                    return [
                        { label: "Obserwujący", value: json.data.statistics.total.followers, suffix: "" },
                        { label: "Polubień", value: json.data.statistics.total.likes, suffix: "" },
                        { label: "Filmów", value: json.data.statistics.total.uploads, suffix: "" }
                    ];
                }
            } catch (err) {
                console.error("Błąd pobierania danych:", err);
                return [];
            }
        }

        async function updateStats(platform, event) {
            if (event) {
                document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }

            const stats = await fetchData(platform);
            const display = document.getElementById('stats-display');
            display.innerHTML = ""; 

            stats.forEach(item => {
                display.innerHTML += `
                    <div class="stat-item">
                        <span class="stat-value">${item.value.toLocaleString()}${item.suffix}</span>
                        ${item.label}
                    </div>`;
            });
        }

        // Automatyczne odświeżanie co 5 minut (300000 ms)
        setInterval(() => updateStats('youtube'), 300000);
        updateStats('youtube');
    </script>
</body>
</html>
