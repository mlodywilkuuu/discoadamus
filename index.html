<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discoadamus</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #f5f7fa, #c3cfe2); height: 100vh; display: flex; flex-direction: column; }
        
        .navbar { display: flex; align-items: center; padding: 20px 50px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .logo { margin-right: auto; font-weight: bold; }
        
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 30px; }
        
        /* Animacja gradientu */
        h1 { 
            font-size: 4rem; text-transform: uppercase; margin: 0; 
            background: linear-gradient(90deg, #f72585, #4cc9f0, #f72585);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .stats-wrapper { background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); padding: 30px 50px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); }
        .glass-stats { display: flex; gap: 40px; justify-content: center; }
        .stat-item { text-align: center; }
        .stat-value { display: block; font-size: 1.8rem; font-weight: bold; color: #1a1a2e; }
        
        .switcher { display: flex; gap: 15px; justify-content: center; }
        .btn { padding: 10px 25px; border: none; border-radius: 50px; cursor: pointer; background: rgba(255, 255, 255, 0.5); font-weight: bold; transition: 0.3s; }
        .btn.active { background: #4cc9f0; color: white; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Discoadamus</div>
    </nav>

    <main class="hero">
        <h1>DISCO ADAMUS</h1>
        <div class="switcher">
            <button class="btn active" onclick="updateStats('youtube', event)">YouTube</button>
            <button class="btn" onclick="updateStats('tiktok', event)">TikTok</button>
        </div>

        <div class="stats-wrapper">
            <div id="stats-display" class="glass-stats"></div>
        </div>
    </main>

    <script>
        const data = {
            youtube: [
                { label: "Subskrypcje", value: 12200, suffix: "K" },
                { label: "Wyświetleń", value: 4572634, suffix: "M" },
                { label: "Filmów", value: 392, suffix: "" }
            ],
            tiktok: [
                { label: "Obserwujący", value: 73.04, suffix: "K" },
                { label: "Polubień", value: 3.6, suffix: "M" },
                { label: "Filmów", value: 887, suffix: "" }
            ]
        };

        function animateNumber(element, target, suffix) {
            let start = 0;
            const duration = 2000;
            const step = target / (duration / 16);
            const timer = setInterval(() => {
                start += step;
                if (start >= target) {
                    element.innerHTML = Math.floor(target).toLocaleString() + suffix;
                    clearInterval(timer);
                } else {
                    element.innerHTML = Math.floor(start).toLocaleString();
                }
            }, 16);
        }

        function updateStats(platform, event) {
            if (event) {
                document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
                event.target.classList.add('active');
            }
            const display = document.getElementById('stats-display');
            display.innerHTML = ""; 

            data[platform].forEach(item => {
                const div = document.createElement('div');
                div.className = 'stat-item';
                div.innerHTML = `<span class="stat-value">0</span>${item.label}`;
                display.appendChild(div);
                animateNumber(div.querySelector('.stat-value'), item.value, item.suffix);
            });
        }

        updateStats('youtube');
    </script>
</body>
</html>
